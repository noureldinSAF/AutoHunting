# Secret Scanner Configuration File
signatures:
  - pattern:
      sensitive: true
      name: AWS Access Key ID Value
      value: (A3T[A-Z0-9]|AKIA|AGPA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}

  - pattern:
      sensitive: true
      name: Generic Token
      value: >-
        (?mi)(\"|')?(access|api|secret)?[_-]?(token|secret|key)(\"|')?( )?(=|:)(( )?)+(\"|')?[\w\-\ ]+(\"|')?

  - pattern:
      sensitive: true
      name: Generic Password
      value: >-
        (?mi)(\"|')?(user|admin|portal|dashboard)?[_-]?(password)(\"|')?( )?(=|:)(( )?)+(\"|')?[\w\-]+(\"|')?

  - pattern:
      sensitive: true
      name: AWS ARN
      value: arn:aws:[a-z0-9-]+:[a-z]{2}-[a-z]+-[0-9]+:[0-9]+:.+

  - pattern:
      sensitive: true
      name: AWS AppSync GraphQL Key
      value: da2-[a-z0-9]{26}

  - pattern:
      sensitive: true
      name: GitHub
      value: '[gG][iI][tT][hH][uU][bB].*[''|"][0-9a-zA-Z]{35,40}[''|"]'

  - pattern:
      sensitive: true
      name: Github App Token
      value: (ghu|ghs)_[0-9a-zA-Z]{36}

  - pattern:
      sensitive: true
      name: Github OAuth Access Token
      value: gho_[0-9a-zA-Z]{36}

  - pattern:
