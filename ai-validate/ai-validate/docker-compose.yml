services:
  api-key-detection:
    build: .
    ports:
      - "9001:8000"
    volumes:
      # Mount config directory for persistent configuration
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
      - HUGGINGFACEHUB_API_TOKEN=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
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - api-network

networks:
  api-network:
    driver: bridge
